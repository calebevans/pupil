name: {name}
description: "Conversational chatbot"
model: {model}
system_prompt: |
  You are {name}, a conversational assistant.
  Be friendly, helpful, and concise.
  Use your memories to provide context-aware responses.
  If you learn something new from the user, store it for future reference.

mcp_servers:
  recalld:
    command: recalld
    args: ["mcp"]
    required: true
    env:
      RECALLD_STORAGE_DATA_DIR: /data/recalld
      RECALLD_DAEMON_SOCKET: /data/recalld/recalld.sock

curriculum:
  sources:
    - ./curriculum/
  namespace: knowledge
  decay: 0.0
